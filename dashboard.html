<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inverse Crown - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #060305; font-family: 'Outfit', sans-serif; }
        .bling-rainbow {
            background: linear-gradient(90deg, #ff0055, #ffcc00, #00ff66, #00ffff, #b300ff, #ff0055);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow-shift 4s linear infinite;
            font-weight: 900;
        }
        @keyframes rainbow-shift { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }
        .admin-glow { text-shadow: 0 0 10px #ff003c; }
    </style>
</head>
<body class="text-slate-100 min-h-screen pb-24 relative overflow-x-hidden">

    <!-- Ambient Video Loop Background -->
    <div class="fixed inset-0 z-0 opacity-30 pointer-events-none">
        <video id="bg-video" class="w-full h-full object-cover" autoplay loop muted playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-laser-lights-background-loop-41857-large.mp4" type="video/mp4">
        </video>
    </div>

    <!-- 🚨 ADMIN NOTIFICATION POP-UP -->
    <div id="admin-notif-box" class="fixed top-4 left-4 right-4 z-50 max-w-sm mx-auto hidden">
        <div class="bg-black/95 border-2 border-red-500 rounded-2xl p-4 shadow-[0_0_25px_rgba(255,0,60,0.6)] backdrop-blur-md animate__animated animate__fadeInDown flex flex-col gap-3">
            <div class="flex justify-between items-start">
                <div class="flex gap-2 items-center">
                    <i class="fa-solid fa-bell text-red-500 animate-bounce"></i>
                    <span class="text-[10px] bg-red-950 text-red-400 px-2 py-0.5 rounded-full font-bold uppercase tracking-widest">Top Up Request</span>
                </div>
                <button onclick="closeNotif()" class="text-zinc-500 hover:text-white text-xs"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="flex gap-3 items-center">
                <img id="notif-img" src="" class="w-14 h-14 rounded-lg object-cover border-2 border-red-500 shadow-[0_0_5px_#ff003c] bg-zinc-900">
                <div class="text-xs">
                    <p class="text-zinc-400">User: <span id="notif-user" class="font-bold text-white"></span> (<span id="notif-id" class="font-mono text-red-400"></span>)</p>
                    <p class="text-amber-400 font-black mt-0.5 text-sm">Jumlah: <span id="notif-amount"></span> Wibu Game</p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-2 pt-1">
                <button id="btn-reject-notif" class="py-1.5 bg-zinc-900 hover:bg-zinc-800 text-red-400 border border-zinc-800 rounded-xl text-xs font-bold transition-all">Reject</button>
                <button id="btn-approve-notif" class="py-1.5 bg-gradient-to-r from-emerald-600 to-green-600 hover:from-emerald-500 text-white rounded-xl text-xs font-black tracking-wider uppercase transition-all">Approve</button>
            </div>
        </div>
    </div>

    <!-- Main UI Content -->
    <main class="relative z-10 w-full max-w-md mx-auto p-4 space-y-5">
        
        <div class="flex justify-between items-center bg-black/60 p-4 rounded-2xl border border-red-500/20 backdrop-blur-md">
            <h1 class="text-sm font-black tracking-widest text-white"><i class="fa-solid fa-crown text-red-500 mr-1.5"></i> INVERSE CROWN</h1>
            <div id="admin-link-container"></div>
        </div>

        <!-- PROFILE DISPLAY CARD -->
        <div class="bg-black/80 border border-red-500/20 rounded-3xl p-5 text-center relative overflow-hidden shadow-2xl">
            <div class="w-20 h-20 mx-auto mb-3 relative group cursor-pointer" onclick="triggerAvatarUpload()">
                <div class="absolute inset-0 bg-black/60 rounded-full opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all z-20">
                    <i class="fa-solid fa-camera text-sm text-white"></i>
                </div>
                <img src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Default" id="user-avatar" class="rounded-full border border-red-500 p-1 bg-zinc-950 w-full h-full object-cover relative z-10">
                <input type="file" id="avatar-file-input" accept="image/*" class="hidden" onchange="uploadNewAvatar(this)">
            </div>

            <h2 id="prof-user" class="text-base font-bold text-white">Guest</h2>
            <p id="prof-id" class="text-[10px] text-red-500 font-mono">ID: ...</p>
            
            <div class="mt-3 inline-flex items-center gap-1 bg-white/5 border border-white/10 px-3 py-1 rounded-full">
                <span class="text-[9px] text-zinc-400 uppercase tracking-wider">Rank Title:</span>
                <span id="prof-title" class="text-xs">Loading...</span>
            </div>

            <div class="mt-4 pt-3 border-t border-zinc-900 flex justify-between text-left px-2">
                <div>
                    <span class="text-[9px] text-zinc-500 uppercase block">Total Balance</span>
                    <span id="prof-donate" class="text-sm font-black text-amber-400">0 Wibu Game</span>
                </div>
                <div class="text-right">
                    <span class="text-[9px] text-zinc-500 uppercase block">System Account</span>
                    <span id="prof-role" class="text-[10px] text-emerald-400 font-bold">User</span>
                </div>
            </div>
        </div>

        <!-- UPLOAD DONASI COMPONENT -->
        <div class="bg-black/80 border border-red-500/20 rounded-3xl p-5 space-y-4 shadow-2xl">
            <h3 class="text-xs font-black tracking-wider text-white uppercase flex items-center gap-1.5"><i class="fa-solid fa-cloud-arrow-up text-red-500"></i> Tempat Upload Donasi</h3>
            
            <form onsubmit="submitBuktiToCloud(event)" class="space-y-3">
                <div>
                    <label class="block text-[9px] uppercase text-zinc-400 font-bold mb-1">Upload Foto Bukti</label>
                    <div class="border border-dashed border-zinc-800 bg-zinc-950/50 rounded-xl p-3 text-center cursor-pointer relative">
                        <input type="file" id="up-file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" required onchange="previewImg(this)">
                        <div id="prompt" class="text-[11px] text-zinc-500"><i class="fa-solid fa-image mb-1 text-base block text-red-500/50"></i> Pilih Gambar Transaksi</div>
                        <img id="preview" class="hidden max-h-32 mx-auto rounded border border-red-500/30">
                    </div>
                </div>
                <input type="text" id="up-id" placeholder="ID Wibuku" class="w-full bg-zinc-950/60 border border-zinc-800 rounded-xl py-2 px-3 text-xs text-white focus:outline-none" required readonly>
                <input type="text" id="up-user" placeholder="Username" class="w-full bg-zinc-950/60 border border-zinc-800 rounded-xl py-2 px-3 text-xs text-white focus:outline-none" required readonly>
                <input type="number" id="up-donate" placeholder="Jumlah (Wibu Game)" class="w-full bg-zinc-950/60 border border-zinc-800 rounded-xl py-2 px-3 text-xs text-white focus:outline-none focus:border-red-500" required>

                <button type="submit" class="w-full py-2.5 bg-gradient-to-r from-red-600 to-rose-700 text-white rounded-xl text-xs font-bold uppercase tracking-widest">Kirim & Kirim Notif WA</button>
            </form>
        </div>

        <!-- BACKGROUND MANAGER -->
        <div class="bg-black/80 border border-zinc-800 rounded-3xl p-4 space-y-3">
            <h4 class="text-[11px] font-bold text-zinc-400 uppercase"><i class="fa-solid fa-video text-zinc-500 mr-1"></i> Video Loop Background URL</h4>
            <div class="flex gap-2">
                <input type="text" id="video-url" placeholder="Paste URL mentah .mp4 disini" class="flex-grow bg-zinc-950 border border-zinc-800 rounded-xl py-2 px-3 text-xs text-white focus:outline-none">
                <button onclick="changeVideo()" class="px-3 bg-zinc-800 text-xs font-bold rounded-xl border border-zinc-700">Apply</button>
            </div>
        </div>

        <div class="text-center">
            <button onclick="logout()" class="text-xs text-zinc-600 hover:text-red-500 underline">Sign Out Session</button>
        </div>

    </main>

    <script>
        const SUPABASE_URL = "https://smfrshlomjdeafxabvii.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_l5i2m71eYD45yBrAA_kdrw_dSddOWd4";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let sessionUser = null;

        window.onload = async function() {
            sessionUser = JSON.parse(localStorage.getItem('ic_session'));
            
            // PENGAMAN KETAT: Jika sesi local storage kosong, buat sesi guest otomatis biar tidak nge-blank/loading terus
            if (!sessionUser) { 
                sessionUser = { username: "Guest_User", idWibuku: "WBK-GUEST", role: "User", title: "User" };
                localStorage.setItem('ic_session', JSON.stringify(sessionUser));
            }

            await reloadProfileData();

            let savedVid = localStorage.getItem('ic_custom_video');
            if(savedVid) { document.getElementById('bg-video').src = savedVid; }
        };

        async function reloadProfileData() {
            try {
                // Tarik data profil dari database Supabase
                let { data: userProfile, error } = await _supabase.from('users_profile').select('*').eq('username', sessionUser.username).single();
                
                // ANTI-MACET ENGINE: Jika akun belum tercatat di Supabase, buat baris datanya secara otomatis saat ini juga!
                if (!userProfile) {
                    const { data: newProfile, error: createError } = await _supabase.from('users_profile').insert([{
                        id_wibuku: sessionUser.idWibuku,
                        username: sessionUser.username,
                        role: sessionUser.role || "User",
                        total_donate: 0
                    }]).select().single();
                    userProfile = newProfile;
                }

                if (userProfile) {
                    document.getElementById('prof-user').innerText = userProfile.username;
                    document.getElementById('prof-id').innerText = "ID: " + userProfile.id_wibuku;
                    document.getElementById('prof-donate').innerText = userProfile.total_donate + " Wibu Game";
                    document.getElementById('prof-role').innerText = userProfile.role;

                    document.getElementById('up-id').value = userProfile.id_wibuku;
                    document.getElementById('up-user').value = userProfile.username;

                    const titleEl = document.getElementById('prof-title');
                    if (userProfile.role === 'Admin') {
                        titleEl.innerText = `👑 ${sessionUser.title || 'Admin'} 👑`;
                        titleEl.className = "text-xs font-black text-red-500 uppercase tracking-widest admin-glow animate-pulse";
                        document.getElementById('admin-link-container').innerHTML = `<a href="admin.html" class="text-[10px] bg-red-950 text-red-400 border border-red-500/30 px-2.5 py-1 rounded-xl font-bold">Owner Panel <i class="fa-solid fa-arrow-right ml-1"></i></a>`;
                        listenRealtimeApprovals();
                    } else {
                        titleEl.innerText = getDynamicUserTitle(userProfile.total_donate);
                        titleEl.className = "text-xs bling-rainbow";
                    }

                    if (userProfile.avatar_url && userProfile.avatar_url.trim() !== "") {
                        document.getElementById('user-avatar').src = userProfile.avatar_url;
                    } else {
                        document.getElementById('user-avatar').src = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${userProfile.username}&backgroundColor=060305`;
                    }
                }
            } catch (err) {
                console.error("Terjadi interupsi data:", err);
            }
        }

        function listenRealtimeApprovals() {
            _supabase
                .channel('schema-db-changes')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'pending_approvals' }, (payload) => {
                    showAdminNotifPopUp(payload.new);
                })
                .subscribe();
        }

        function showAdminNotifPopUp(data) {
            document.getElementById('notif-img').src = data.photo_url;
            document.getElementById('notif-user').innerText = data.username;
            document.getElementById('notif-id').innerText = data.id_wibuku;
            document.getElementById('notif-amount').innerText = data.wibu_game_requested.toLocaleString('id-ID');

            document.getElementById('btn-approve-notif').onclick = function() {
                executeQuickApprove(data.id, data.username, data.wibu_game_requested);
            };
            document.getElementById('btn-reject-notif').onclick = function() {
                executeQuickReject(data.id);
            };

            document.getElementById('admin-notif-box').classList.remove('hidden');
        }

        async function executeQuickApprove(id, targetUser, amount) {
            try {
                const { data: profile } = await _supabase.from('users_profile').select('total_donate').eq('username', targetUser).single();
                let currentBalance = profile ? profile.total_donate : 0;
                
                await _supabase.from('users_profile').update({ total_donate: currentBalance + amount }).eq('username', targetUser);
                await _supabase.from('pending_approvals').delete().eq('id', id);

                alert(`Berhasil menambahkan ${amount} Wibu Game untuk ${targetUser}!`);
                closeNotif();
                await reloadProfileData();
            } catch (err) {
                alert("Gagal melakukan approve instan.");
            }
        }

        async function executeQuickReject(id) {
            if(confirm("Tolak ajuan ini?")) {
                await _supabase.from('pending_approvals').delete().eq('id', id);
                closeNotif();
            }
        }

        function closeNotif() {
            document.getElementById('admin-notif-box').classList.add('hidden');
        }

        function triggerAvatarUpload() {
            document.getElementById('avatar-file-input').click();
        }

        async function uploadNewAvatar(input) {
            if (!input.files || !input.files[0]) return;
            
            const file = input.files[0];
            const fileExt = file.name.split('.').pop();
            const fileName = `avatar_${sessionUser.username}_${Date.now()}.${fileExt}`;
            const filePath = `avatars/${fileName}`;

            document.getElementById('user-avatar').classList.add('animate-pulse');

            try {
                // Menggunakan service storage bypass RLS global via bucket publik
                const { data: uploadData, error: uploadError } = await _supabase.storage
                    .from('bukti-transfer')
                    .upload(filePath, file, { cacheControl: '3600', upsert: true });

                if (uploadError) throw uploadError;

                const { data: urlData } = _supabase.storage.from('bukti-transfer').getPublicUrl(filePath);
                const publicAvatarUrl = urlData.publicUrl;

                await _supabase.from('users_profile').update({ avatar_url: publicAvatarUrl }).eq('username', sessionUser.username);

                document.getElementById('user-avatar').src = publicAvatarUrl;
                alert("Foto profil/avatar berhasil diperbarui!");
                
            } catch (err) {
                alert("Gagal upload foto profil. Pastikan Kebijakan (Policy) Storage di Supabase sudah dibuat untuk 'anon'!");
            } finally {
                document.getElementById('user-avatar').classList.remove('animate-pulse');
            }
        }

        function getDynamicUserTitle(donateValue) {
            if (donateValue <= 0) return "✨ Wibu Recruit ✨";
            if (donateValue < 50000) return "🔥 Crimson Demon 🔥";
            return "🛡️ Overlord Elite 🛡️";
        }

        function previewImg(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').classList.remove('hidden');
                    document.getElementById('prompt').classList.add('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function submitBuktiToCloud(e) {
            e.preventDefault();
            const fileInput = document.getElementById('up-file');
            const idW = document.getElementById('up-id').value;
            const user = document.getElementById('up-user').value;
            const donateAmount = parseInt(document.getElementById('up-donate').value);

            if (!fileInput.files[0]) return;

            const file = fileInput.files[0];
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}.${fileExt}`;
            const filePath = `bukti/${fileName}`;

            try {
                const { data: uploadData, error: uploadError } = await _supabase.storage
                    .from('bukti-transfer')
                    .upload(filePath, file, { cacheControl: '3600', upsert: true });

                if (uploadError) throw uploadError;

                const { data: urlData } = _supabase.storage.from('bukti-transfer').getPublicUrl(filePath);
                const photoPublicUrl = urlData.publicUrl;

                await _supabase.from('pending_approvals').insert([{
                    id_wibuku: idW,
                    username: user,
                    wibu_game_requested: donateAmount,
                    photo_url: photoPublicUrl
                }]);

                const waText = `Halo Owner,%0A%0ASaya telah mengajukan top up saldo.%0A- *ID Wibuku:* ${idW}%0A- *Username:* ${user}%0A- *Jumlah:* ${donateAmount} Wibu Game%0A%0ABukti tersimpan di cloud Supabase.`;
                window.open(`https://api.whatsapp.com/send?phone=6289531980008&text=${waText}`, '_blank');
                
                alert("Berhasil diajukan!");
                location.reload();
            } catch (err) {
                alert("Gagal mengunggah gambar transaksi. Harap pastikan Policy di Supabase Storage kamu diset Kustom Penuh (All Operations untuk 'anon').");
            }
        }

        function changeVideo() {
            let url = document.getElementById('video-url').value;
            if(url) {
                localStorage.setItem('ic_custom_video', url);
                document.getElementById('bg-video').src = url;
                alert("Latar belakang berhasil disetel!");
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
