<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inverse Crown - Sign In</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #060305; font-family: 'Outfit', sans-serif; }
        .cyber-glow { text-shadow: 0 0 15px #ff003c; }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex items-center justify-center p-4 relative">

    <video class="fixed inset-0 w-full h-full object-cover opacity-25 z-0" autoplay loop muted playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-laser-lights-background-loop-41857-large.mp4" type="video/mp4">
    </video>

    <div class="relative z-10 w-full max-w-sm bg-black/85 border border-red-500/20 backdrop-blur-md p-6 rounded-3xl shadow-2xl space-y-6 animate__animated animate__fadeInUp">
        <div class="text-center">
            <h2 class="text-xl font-black tracking-widest text-white cyber-glow">GATEWAY LOGIN</h2>
            <p class="text-[10px] text-zinc-500 uppercase tracking-wider">Sistem Sinkronisasi GitHub & Supabase</p>
        </div>

        <form onsubmit="handleAuth(event)" class="space-y-4">
            <div>
                <input type="text" id="auth-user" placeholder="Username" class="w-full bg-zinc-950/60 border border-zinc-800 rounded-xl py-2.5 px-4 text-xs focus:outline-none focus:border-red-500 transition-all text-white" required>
            </div>
            <div>
                <input type="password" id="auth-pass" placeholder="Password" class="w-full bg-zinc-950/60 border border-zinc-800 rounded-xl py-2.5 px-4 text-xs focus:outline-none focus:border-red-500 transition-all text-white" required>
            </div>
            <div>
                <input type="text" id="auth-id" placeholder="ID Wibuku (Khusus User Baru)" class="w-full bg-zinc-950/30 border border-zinc-900 rounded-xl py-2.5 px-4 text-xs focus:outline-none focus:border-zinc-700 transition-all text-zinc-400">
                <span class="text-[9px] text-zinc-600 block mt-1 pl-1">*Kosongkan jika kamu Admin di GitHub</span>
            </div>
            <button type="submit" id="btn-submit" class="w-full py-3 bg-gradient-to-r from-red-600 to-rose-700 hover:from-red-500 text-white rounded-xl text-xs font-bold tracking-widest uppercase transition-all shadow-[0_0_15px_rgba(255,0,60,0.3)]">
                Authorize Session
            </button>
        </form>
    </div>

    <script>
        // Memakai link raw github kamu yang sudah benar di gambar 104678.jpg
        const GITHUB_JSON_URL = "https://raw.githubusercontent.com/kyellnewbie1/punya-kyu/refs/heads/main/accounts.json"; 
        
        const SUPABASE_URL = "https://smfrshlomjdeafxabvii.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_l5i2m71eYD45yBrAA_kdrw_dSddOWd4";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function handleAuth(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.innerText = "Processing Matrix...";

            // Dipastikan tidak ada spasi yang merusak data inputan
            const usernameInput = document.getElementById('auth-user').value.trim();
            const passwordInput = document.getElementById('auth-pass').value.trim();
            const idWibukuInput = document.getElementById('auth-id').value.trim();

            try {
                // 1. Ambil data dari repository github kustom kamu
                const res = await fetch(GITHUB_JSON_URL + '?t=' + Date.now()); // bypass cache browser
                if (!res.ok) throw new Error("Gagal membaca config akun dari GitHub.");
                const githubData = await res.json();
                
                // Cari data akun staff di file json github kamu
                const adminMatch = githubData.staff_accounts.find(acc => 
                    acc.username.toLowerCase() === usernameInput.toLowerCase() && 
                    String(acc.password) === passwordInput
                );

                if (adminMatch) {
                    // PENTING: Paksa simpan / daftarkan ke tabel database Supabase dulu biar profilnya gak kosong
                    const { data: checkDb } = await _supabase.from('users_profile').select('*').eq('username', adminMatch.username).single();
                    if (!checkDb) {
                        await _supabase.from('users_profile').insert([{
                            id_wibuku: String(adminMatch.id_wibuku),
                            username: adminMatch.username,
                            role: adminMatch.role,
                            total_donate: 0
                        }]);
                    }
                    
                    // Kunci data sesi lokal
                    localStorage.clear(); // bersihkan sampah sisa login guest sebelumnya
                    localStorage.setItem('ic_session', JSON.stringify({
                        username: adminMatch.username,
                        idWibuku: String(adminMatch.id_wibuku),
                        role: adminMatch.role,
                        title: adminMatch.title
                    }));

                    alert(`Otorisasi Berhasil! Selamat datang ${adminMatch.title} ${adminMatch.username}.`);
                    // Gunakan rute lokasi relatif agar aman di Vercel deployment
                    window.location.replace('dashboard.html');
                    return;
                }

                // 2. Jika user biasa, periksa ke database Supabase
                const { data: userDb } = await _supabase
                    .from('users_profile')
                    .select('*')
                    .eq('username', usernameInput)
                    .single();

                if (userDb) {
                    localStorage.clear();
                    localStorage.setItem('ic_session', JSON.stringify({
                        username: userDb.username,
                        idWibuku: userDb.id_wibuku,
                        role: userDb.role,
                        title: "User"
                    }));
                    window.location.replace('dashboard.html');
                } else {
                    if (!idWibukuInput) {
                        alert("Akun baru terdeteksi! Mohon masukkan ID Wibuku kamu di kolom paling bawah.");
                        btn.disabled = false; btn.innerText = "Authorize Session";
                        return;
                    }

                    const { error: insertErr } = await _supabase
                        .from('users_profile')
                        .insert([{
                            id_wibuku: idWibukuInput,
                            username: usernameInput,
                            role: "User",
                            total_donate: 0
                        }]);

                    if (insertErr) throw insertErr;

                    localStorage.clear();
                    localStorage.setItem('ic_session', JSON.stringify({
                        username: usernameInput,
                        idWibuku: idWibukuInput,
                        role: "User",
                        title: "User"
                    }));

                    alert("Akun baru kamu berhasil dibuat di Supabase!");
                    window.location.replace('dashboard.html');
                }

            } catch (err) {
                alert("Otorisasi Gagal: " + err.message);
                btn.disabled = false; btn.innerText = "Authorize Session";
            }
        }
    </script>
</body>
</html>
